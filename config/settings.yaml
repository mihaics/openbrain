database:
  host: localhost
  port: 5433
  name: openbrain
  user: openbrain
  password: openbrain_local

embedder:
  provider: ollama
  model: nomic-embed-text
  dimensions: 768

mcp:
  host: 0.0.0.0
  port: 8080

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"

web:
  port: 3777

tags:
  deny_list:
    - password
    - secret
    - api_key
    - token
    - credential
  default_tags:
    - auto

analytics:
  trend_weeks: 4
  weekly_report_day: 6

security:
  mode: direct
