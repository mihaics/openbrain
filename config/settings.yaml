database:
  host: postgres
  port: 5432
  name: openbrain
  user: postgres
  password: openbrain

embedder:
  provider: openrouter
  model: text-embedding-3-small
  dimensions: 768

mcp:
  host: 0.0.0.0
  port: 8080

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"

dashboard:
  port: 8501

tags:
  deny_list:
    - password
    - secret
    - api_key
    - token
    - credential
  default_tags:
    - auto

analytics:
  trend_weeks: 4
  weekly_report_day: 6

security:
  mode: direct
