services:
  api:
    build: .
    container_name: openbrain-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
    - .env
    environment:
      DB_HOST: postgres
      DB_NAME: openbrain
      DB_PASSWORD: openbrain
      DB_PORT: 5432
      DB_USER: postgres
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
    - 8000:8000
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    container_name: openbrain-web
    depends_on:
    - api
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
    - 3777:3777
  postgres:
    container_name: openbrain-postgres
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_PASSWORD: openbrain
      POSTGRES_USER: postgres
    healthcheck:
      interval: 5s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      timeout: 5s
    image: pgvector/pgvector:pg16
    ports:
    - 5433:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: null
